<header class="navbar" role="banner">
    <div class="navbar-marca">
        <a href="{% url 'inicio:landing' %}" class="navbar-logo">RYV Rentas</a>
    </div>
    <nav class="navbar-acciones" aria-label="Acciones de usuario">
        {% if request.user.is_authenticated %}
            <span class="navbar-usuario">
                {{ request.user.get_full_name|default:request.user.username }}
                <span class="badge-rol badge-rol--{{ request.user.rol }}">{{ request.user.get_rol_display }}</span>
            </span>
            {% if total_alertas > 0 %}
                <span class="navbar-alerta-contador" aria-label="{{ total_alertas }} alertas">{{ total_alertas }}</span>
            {% endif %}
            <form method="post" action="{% url 'authentication:logout' %}" class="form-logout">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Cerrar sesión</button>
            </form>
        {% else %}
            <a href="{% url 'authentication:login' %}" class="btn-login">Iniciar sesión</a>
        {% endif %}
    </nav>
</header>
