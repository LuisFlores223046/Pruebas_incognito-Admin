{% if page_obj.has_other_pages %}
<nav class="paginacion" aria-label="Paginación">
    <ul class="paginacion-lista">
        {% if page_obj.has_previous %}
        <li class="paginacion-item">
            <a href="?page={{ page_obj.previous_page_number }}" class="paginacion-enlace">&laquo; Anterior</a>
        </li>
        {% endif %}
        <li class="paginacion-item paginacion-item--actual" aria-current="page">
            Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}
        </li>
        {% if page_obj.has_next %}
        <li class="paginacion-item">
            <a href="?page={{ page_obj.next_page_number }}" class="paginacion-enlace">Siguiente &raquo;</a>
        </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
